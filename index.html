<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jonas Rackl</title>
<meta name="description" content="Chemist trained at TUM, UC Berkeley, and ETH Zurich. Joining the Raines Group at MIT to work on RNA chemistry, chemical biology, and enzymology." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Bricolage+Grotesque:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css">

<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-paper, #fdfbf6);
    font-family: var(--f-sans);
    color: var(--ink);
    min-height: 100vh;
  }

  /* V11 was designed on a fixed 1280x1000 artboard with absolute
     positioning. We render it at native size and scale-to-fit on
     narrower viewports so the design holds up on laptops and phones. */
  #stage {
    width: 1280px;
    margin: 0 auto;
    transform-origin: top center;
  }
  @media (max-width: 1280px) {
    #stage {
      transform: scale(calc(100vw / 1280));
      /* Compensate for the scale so the body height matches what's
         visible — otherwise we get phantom whitespace below the fold. */
      height: calc(1000px * (100vw / 1280));
      overflow: hidden;
    }
  }

  /* Hide the page until React + Babel finish booting so visitors
     don't see raw markup flash. */
  #root:empty { display: none; }
  #boot-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-paper, #fdfbf6);
    z-index: 100;
    transition: opacity 0.3s ease;
    color: var(--ink-soft, #5b544a);
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  #boot-screen.gone { opacity: 0; pointer-events: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script src="image-slot.js"></script>
<script type="text/babel" src="landing.jsx"></script>
</head>
<body>

<div id="boot-screen">— loading</div>

<div id="stage">
  <div id="root"></div>
</div>

<script type="text/babel">
  // ────────────────────────────────────────────────────────────────
  // V11 visual defaults baked in (no live TweaksPanel in production)
  // Mirrors TWEAK_DEFAULTS from the design-canvas index.html:
  //   palette: sunrise, warmth: cream, grain: 25, grainStyle: paper, nameFace: serif
  // ────────────────────────────────────────────────────────────────
  const PALETTE = {
    '--c-rust':   '#c8543d',
    '--c-ember':  '#b13923',
    '--c-amber':  '#e2a25a',
    '--c-rose':   '#c66a6a',
    '--c-blush':  '#e6c7bd',
    '--c-sky':    '#8aa1bd',
    '--c-indigo': '#4a4d7a',
    '--c-sage':   '#8a9a7a',
    '--c-cream':  '#efddb8',
    '--c-dusk':   '#6b5a72',
  };
  const WARMTH = {
    '--bg': '#fdfbf6',
    '--bg-paper': '#fefefc',
    '--bg-deep': '#f7f3e8',
  };
  const NAME_FACE = {
    '--f-name': '"Newsreader", "Source Serif", Georgia, serif',
    '--f-name-weight': '500',
    '--f-name-tracking': '-0.022em',
  };

  const html = document.documentElement;
  Object.entries(PALETTE).forEach(([k, v]) => html.style.setProperty(k, v));
  Object.entries(WARMTH).forEach(([k, v]) => html.style.setProperty(k, v));
  Object.entries(NAME_FACE).forEach(([k, v]) => html.style.setProperty(k, v));
  html.style.setProperty('--grain-amount', '0.25');
  html.classList.add('s-paper');

  // Mount V11.
  ReactDOM.createRoot(document.getElementById('root')).render(
    <LandingMinimalGrain/>
  );

  // Dismiss boot screen on next frame.
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const b = document.getElementById('boot-screen');
      if (b) {
        b.classList.add('gone');
        setTimeout(() => b.remove(), 400);
      }
    });
  });
</script>

</body>
</html>
